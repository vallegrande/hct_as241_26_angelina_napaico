<div class="min-h-screen bg-slate-100 font-sans">

  <!-- Header -->
  <header class="bg-white border-b border-slate-200 shadow-sm">
    <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-violet-600 to-indigo-600 flex items-center justify-center shadow-md">
          <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M8 17l-1.5-5H4a1 1 0 01-1-1V9a1 1 0 011-1h1l2-4h10l2 4h1a1 1 0 011 1v2a1 1 0 01-1 1h-2.5L16 17H8z" />
            <circle cx="8.5" cy="17.5" r="1.5" stroke-width="2"/>
            <circle cx="15.5" cy="17.5" r="1.5" stroke-width="2"/>
          </svg>
        </div>
        <div>
          <p class="font-bold text-slate-900 text-base leading-tight">AutoRent</p>
          <p class="text-xs text-slate-400 leading-tight">Sistema de Gestión de Vehículos</p>
        </div>
      </div>
      <div class="flex items-center gap-2 bg-slate-50 border border-slate-200 px-3.5 py-1.5 rounded-full">
        <span class="w-2 h-2 rounded-full bg-emerald-500 ring-2 ring-emerald-500/30"></span>
        <span class="text-xs font-semibold text-slate-700">Angelina Napaico</span>
      </div>
    </div>
  </header>

  <!-- Tab Navigation -->
  <div class="bg-white border-b border-slate-200 sticky top-0 z-30">
    <div class="max-w-6xl mx-auto px-6">
      <nav class="flex gap-0" role="tablist">
        <button
          role="tab"
          [attr.aria-selected]="activeTab() === 'clientes'"
          (click)="setTab('clientes')"
          class="relative px-6 py-4 text-sm font-semibold transition-colors duration-150 focus:outline-none flex items-center gap-2"
          [class.text-violet-700]="activeTab() === 'clientes'"
          [class.text-slate-500]="activeTab() !== 'clientes'"
          [class.hover:text-slate-800]="activeTab() !== 'clientes'">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0" />
          </svg>
          Clientes
          <span *ngIf="activeTab() === 'clientes'"
            class="absolute bottom-0 left-0 right-0 h-0.5 bg-violet-600 rounded-t-full"></span>
        </button>

        <button
          role="tab"
          [attr.aria-selected]="activeTab() === 'alquileres'"
          (click)="setTab('alquileres')"
          class="relative px-6 py-4 text-sm font-semibold transition-colors duration-150 focus:outline-none flex items-center gap-2"
          [class.text-violet-700]="activeTab() === 'alquileres'"
          [class.text-slate-500]="activeTab() !== 'alquileres'"
          [class.hover:text-slate-800]="activeTab() !== 'alquileres'">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
          </svg>
          Alquileres
          <span *ngIf="activeTab() === 'alquileres'"
            class="absolute bottom-0 left-0 right-0 h-0.5 bg-violet-600 rounded-t-full"></span>
        </button>
      </nav>
    </div>
  </div>

  <!-- Content -->
  <main class="max-w-6xl mx-auto px-6 py-8">
    @if (activeTab() === 'clientes') {
      <app-cliente-list />
    }
    @if (activeTab() === 'alquileres') {
      <app-alquiler-list />
    }
  </main>

</div>
