<div class="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-50 p-4">
  <div class="bg-white rounded-2xl shadow-xl w-full max-w-lg border border-slate-200 overflow-hidden">

    <!-- Modal Header -->
    <div class="px-6 py-4 border-b border-slate-100 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 rounded-xl bg-violet-100 flex items-center justify-center">
          <svg class="w-5 h-5 text-violet-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
          </svg>
        </div>
        <div>
          <h2 class="text-base font-bold text-slate-900">
            {{ alquiler() ? 'Editar Alquiler' : 'Nuevo Alquiler' }}
          </h2>
          <p class="text-xs text-slate-400 mt-0.5">
            {{ alquiler() ? 'Modifica los datos del contrato.' : 'Completa los datos para registrar.' }}
          </p>
        </div>
      </div>
      <button type="button" (click)="close.emit()"
        class="w-8 h-8 flex items-center justify-center rounded-lg text-slate-400 hover:text-slate-700 hover:bg-slate-100 transition-colors duration-150">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>

    <!-- Form -->
    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="p-6 space-y-4">

      <!-- Cliente -->
      <div class="bg-violet-50 border border-violet-100 rounded-xl p-4 space-y-2">
        <div class="flex items-center justify-between">
          <label class="text-xs font-semibold text-violet-800 uppercase tracking-wide">Cliente Asociado</label>
          <button type="button" (click)="toggleModoManual()"
            class="inline-flex items-center gap-1 text-xs font-semibold text-violet-600 hover:text-violet-900 transition-colors duration-150">
            @if (modoManual()) {
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16" />
              </svg>
              Ver lista
            } @else {
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
              </svg>
              Ingresar ID
            }
          </button>
        </div>
        @if (modoManual()) {
          <input type="text" formControlName="clienteId" placeholder="Pega el ID del cliente..."
            class="w-full bg-white border border-slate-300 rounded-lg px-3 py-2 text-sm font-mono text-slate-800 focus:outline-none focus:ring-2 focus:ring-violet-500 focus:border-transparent transition" />
        } @else {
          <select formControlName="clienteId"
            class="w-full bg-white border border-slate-300 rounded-lg px-3 py-2 text-sm text-slate-800 focus:outline-none focus:ring-2 focus:ring-violet-500 focus:border-transparent transition">
            <option [ngValue]="null" disabled>-- Seleccione un cliente --</option>
            @for (cliente of clientes(); track cliente.id) {
              <option [value]="cliente.id">{{ cliente.nombres }} {{ cliente.apellidos }} · DNI {{ cliente.dni }}</option>
            }
          </select>
        }
        @if (form.get('clienteId')?.invalid && form.get('clienteId')?.touched) {
          <p class="text-xs text-rose-600 font-medium flex items-center gap-1">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z" />
            </svg>
            El cliente es obligatorio.
          </p>
        }
      </div>

      <!-- Días y Fechas -->
      <div class="grid grid-cols-3 gap-3">
        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1.5 uppercase tracking-wide">Días</label>
          <input type="number" formControlName="dias" placeholder="0"
            class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm text-center font-bold text-slate-800 focus:outline-none focus:ring-2 focus:ring-violet-500 focus:border-transparent transition" />
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1.5 uppercase tracking-wide">Fecha Inicio</label>
          <input type="date" formControlName="fechaInicio"
            class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm text-slate-800 focus:outline-none focus:ring-2 focus:ring-violet-500 focus:border-transparent transition" />
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1.5 uppercase tracking-wide">Fecha Fin</label>
          <input type="date" formControlName="fechaFin"
            class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm text-slate-800 focus:outline-none focus:ring-2 focus:ring-violet-500 focus:border-transparent transition" />
        </div>
      </div>

      <!-- Total -->
      <div>
        <label class="block text-xs font-semibold text-slate-600 mb-1.5 uppercase tracking-wide">Monto Total (S/)</label>
        <div class="relative">
          <div class="pointer-events-none absolute inset-y-0 left-3 flex items-center">
            <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
          </div>
          <input type="number" step="0.01" formControlName="total" placeholder="0.00"
            class="w-full border border-slate-300 rounded-lg pl-9 pr-3 py-2 text-base font-bold text-emerald-700 focus:outline-none focus:ring-2 focus:ring-violet-500 focus:border-transparent transition" />
        </div>
      </div>

      <!-- Botones -->
      <div class="flex justify-end gap-3 pt-2 border-t border-slate-100">
        <button type="button" (click)="close.emit()"
          class="px-5 py-2 text-sm font-semibold text-slate-600 bg-slate-100 hover:bg-slate-200 rounded-lg transition-colors duration-150">
          Cancelar
        </button>
        <button type="submit" [disabled]="form.invalid"
          class="inline-flex items-center gap-2 px-5 py-2 text-sm font-semibold text-white bg-violet-600 hover:bg-violet-700 rounded-lg shadow-sm disabled:opacity-50 disabled:cursor-not-allowed transition-colors duration-150">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4" />
          </svg>
          {{ alquiler() ? 'Guardar Cambios' : 'Registrar Alquiler' }}
        </button>
      </div>

    </form>
  </div>
</div>
