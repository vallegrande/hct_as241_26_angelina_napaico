# kubectl apply -f hct-cliente-napaico-angelina-deployment.yml

apiVersion: apps/v1
kind: Deployment
metadata:
  name: hct-cliente-napaico-angelina-deployment
  namespace: hct-cliente-napaico-angelina-namespace
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hct-cliente-napaico-angelina-deployment     
  template:
    metadata:
      labels:
        app: hct-cliente-napaico-angelina-deployment   
    spec:
      containers:
      - name: hct-cliente-napaico-angelina-container
        image: valencia123/hct-cliente:latest
        imagePullPolicy: IfNotPresent 
        envFrom:
        - secretRef:
            name: hct-cliente-napaico-angelina-secret