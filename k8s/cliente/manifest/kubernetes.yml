# MINIKUBE FUNCIONA EN CODESPACE | LOCAL
# KUBECTL FUNCIONA DIRECTO EN KILLERCODA (SIN MINIKUBE)

# consultar versión de minikube
minikube version

# consultar si minikube esta en start o stop
minikube status

# iniciar clúster kubernetes
minikube start

# ingresar a la carpeta de los manifiestos de kubernetes (manifest)
cd manifest

# listar namespace
kubectl get namespace
kubectl get ns

# crear un namespace "angelina" por comando mediante un archivo: "hct-cliente-napaico-angelina-namespace.yml"
kubectl apply -f hct-cliente-napaico-angelina-namespace.yml

# consultar namespace en uso por "default" | LINUX
kubectl config view --minify | grep namespace

# consultar namespace en uso por "default" | WINDOWS
kubectl config view --minify | findstr namespace

# cambiar un namespace en uso por "default" a "hct-cliente-napaico-angelina-namespace"
kubectl config set-context --current --namespace=hct-cliente-napaico-angelina-namespace

# consultar todos los recursos de un namespace "hct-cliente-napaico-angelina-namespace"
kubectl get all -n hct-cliente-napaico-angelina-namespace

# consultar todos los recursos y secret de un namespace "hct-cliente-napaico-angelina-namespace"
kubectl get all,secrets -n hct-cliente-napaico-angelina-namespace


# listar services del namespace "hct-cliente-napaico-angelina-namespace"
minikube service hct-cliente-napaico-angelina-service -n hct-cliente-napaico-angelina-namespace
minikube service list

# probar el microservicio dentro del clúster con curl
curl http://192.168.49.2:30001/api/huggingface/history
curl http://192.168.49.2:30001/api/gemini/history

# crear un túnel de puerto la máquina local (host) y el clúster de Kubernetes
kubectl port-forward service/hct-cliente-napaico-angelina-service 8085:30001 -n hct-cliente-napaico-angelina-namespace