# kubectl apply -f hct-cliente-napaico-angelina-service.yml
apiVersion: v1
kind: Service
metadata:
  name: hct-cliente-napaico-angelina-service
  namespace: hct-cliente-napaico-angelina-namespace
spec:
  type: NodePort      #30000-32767  # Cambia a LoadBalancer si estás en un entorno de nube
  ports:
  - port: 30001       # Puerto que el Service expondrá
    targetPort: 9000  # Puerto en el contenedor donde tu aplicación escucha
    nodePort: 30001   # Puerto asignado en el nodo, opcional
  selector:
    app: hct-cliente-napaico-angelina-deployment  # Debe coincidir con las etiquetas del Deployment