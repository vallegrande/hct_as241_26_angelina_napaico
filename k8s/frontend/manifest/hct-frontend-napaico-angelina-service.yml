# kubectl apply -f hct-frontend-napaico-angelina-service.yml
# kubectl get pods -n hct-frontend-napaico-angelina-namespace

apiVersion: v1
kind: Service
metadata:
  name: hct-frontend-napaico-angelina-service
  namespace: hct-frontend-napaico-angelina-namespace
spec:
  type: NodePort      #30000-32767
  ports:
  - port: 30002       # Puerto que el Service expondrá
    targetPort: 80    # Puerto en el contenedor donde tu aplicación escucha
    nodePort: 30002   # Puerto asignado en el nodo
  selector:
    app: hct-frontend-napaico-angelina-deployment  # Debe coincidir con las etiquetas del Deployment
